<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warna DKV - Color Games</title>
<style>
  :root {
    --bg-page: #0f1420;
    --bg-card: rgba(255,255,255,0.06);
    --bg-card-solid: #1a2235;
    --border: rgba(255,255,255,0.12);
    --text-primary: #f1f3f9;
    --text-secondary: #9aa3b8;
    --accent: #7c5cff;
    --success: #34d399;
    --success-bg: rgba(52,211,153,0.15);
    --danger: #f87171;
    --danger-bg: rgba(248,113,113,0.15);
    --warn: #fbbf24;
    --warn-bg: rgba(251,191,36,0.15);
    --radius-md: 10px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg-page);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(124,92,255,0.12), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(52,211,153,0.10), transparent 40%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .app-shell {
    width: 100%;
    max-width: 460px;
  }

  .app-header {
    text-align: center;
    margin-bottom: 20px;
  }

  .app-header h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: 0.2px;
  }

  .app-header p {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0;
  }

  /* ========== GAME SELECTOR SCREEN ========== */
  .game-select-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .game-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 18px;
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    text-align: left;
    color: var(--text-primary);
    font-family: inherit;
    width: 100%;
  }

  .game-card:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
  }

  .game-card:active { transform: scale(0.98); }

  .game-card-icon {
    font-size: 32px;
    line-height: 1;
    flex-shrink: 0;
  }

  .game-card-info { flex: 1; }
  .game-card-name { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
  .game-card-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

  .game-card-arrow {
    font-size: 18px;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  /* ========== LEVEL SELECT (COLOR MIXER) ========== */
  .level-select-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .level-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    text-align: left;
    color: var(--text-primary);
    font-family: inherit;
  }

  .level-card:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
  }

  .level-card:active { transform: scale(0.98); }

  .level-card-left { display: flex; flex-direction: column; gap: 4px; }
  .level-card-name { font-size: 16px; font-weight: 600; }
  .level-card-desc { font-size: 12px; color: var(--text-secondary); }
  .level-card-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    white-space: nowrap;
  }
  .badge-eazy { background: var(--success-bg); color: var(--success); }
  .badge-bisalah { background: rgba(124,92,255,0.18); color: var(--accent); }
  .badge-stress { background: var(--danger-bg); color: var(--danger); }

  /* ========== QUIZ THEORY CATEGORY SELECT ========== */
  .category-select-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .category-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    text-align: left;
    color: var(--text-primary);
    font-family: inherit;
  }

  .category-card:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
  }

  .category-card:active { transform: scale(0.98); }

  .category-card-left { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .category-card-name { font-size: 14px; font-weight: 600; }
  .category-card-sub { font-size: 11px; color: var(--text-secondary); }

  .category-card-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(124,92,255,0.18);
    color: var(--accent);
    white-space: nowrap;
    margin-left: 10px;
  }

  /* ========== MATERI PANEL ========== */
  .materi-panel {
    display: none;
    background: rgba(124,92,255,0.06);
    border: 1px solid rgba(124,92,255,0.25);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text-primary);
  }
  .materi-panel.open { display: block; }

  .materi-panel h4 {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
    margin: 0 0 8px;
  }

  .materi-panel p { margin: 0 0 8px; color: var(--text-secondary); }
  .materi-panel p:last-of-type { margin-bottom: 0; }

  .materi-panel ul {
    margin: 0 0 8px;
    padding-left: 18px;
    color: var(--text-secondary);
  }
  .materi-panel li { margin-bottom: 4px; }
  .materi-panel strong { color: var(--text-primary); }

  .materi-highlight {
    background: rgba(52,211,153,0.08);
    border-left: 3px solid var(--success);
    padding: 8px 12px;
    border-radius: 0 6px 6px 0;
    margin: 8px 0;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .materi-highlight strong { color: var(--success); }

  .category-card-wrap { display: flex; flex-direction: column; }

  .category-card-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .category-card-actions .category-card {
    flex: 1;
    margin: 0;
  }

  .materi-btn {
    flex-shrink: 0;
    padding: 0 14px;
    height: 100%;
    min-height: 56px;
    background: rgba(124,92,255,0.1);
    border: 1px solid rgba(124,92,255,0.3);
    border-radius: var(--radius-lg);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    line-height: 1.2;
  }
  .materi-btn:hover { background: rgba(124,92,255,0.2); }
  .materi-btn:active { transform: scale(0.97); }
  .materi-btn.active {
    background: rgba(124,92,255,0.25);
    border-color: var(--accent);
  }
  .materi-btn-icon { font-size: 16px; }

  .mulai-dari-materi-btn {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .mulai-dari-materi-btn:hover { opacity: 0.88; }

  /* ========== STAT BAR & PROGRESS ========== */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }

  .stat-block { text-align: center; flex: 1; }
  .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 700; }
  .stat-value.xp { color: var(--success); }
  .stat-divider { width: 1px; height: 28px; background: var(--border); }

  .progress-track {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    border-radius: 999px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 0 12px;
    font-family: inherit;
  }
  .back-link:hover { color: var(--text-primary); }

  /* ========== KARTU SOAL (COLOR MIXER) ========== */
  .question-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px 18px;
    margin-bottom: 14px;
    backdrop-filter: blur(10px);
  }

  .question-label {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 14px;
  }
  .question-label .timer { color: var(--danger); font-weight: 600; }

  .swatch-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-wrap: nowrap;
    overflow: hidden;
  }

  .swatch {
    width: 52px;
    height: 52px;
    border-radius: var(--radius-md);
    border: 2px solid #ffffff;
    flex-shrink: 0;
  }

  .swatch.small { width: 26px; height: 26px; border-radius: 6px; border-width: 1.5px; }

  .swatch-row.count-3 .swatch { width: 48px; height: 48px; }
  .swatch-row.count-3 { gap: 5px; }

  .swatch-row.count-4 .swatch { width: 40px; height: 40px; }
  .swatch-row.count-4 { gap: 4px; }

  .swatch-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .swatch-name {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: capitalize;
    letter-spacing: 0.3px;
    font-weight: 500;
    line-height: 1;
  }

  .plus-sign {
    font-size: 18px;
    color: var(--text-secondary);
    font-weight: 300;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-size: 14px;
    text-transform: capitalize;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    text-align: left;
    font-family: inherit;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
  }

  .option-btn:active:not(:disabled) { transform: scale(0.98); }

  .option-btn:disabled {
    cursor: default;
    opacity: 0.55;
  }

  .option-btn.correct {
    background: var(--success-bg);
    border-color: var(--success);
    opacity: 1;
  }

  .option-btn.wrong {
    background: var(--danger-bg);
    border-color: var(--danger);
    opacity: 1;
  }

  /* ========== KARTU SOAL TEORI ========== */
  .theory-question-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 18px;
    margin-bottom: 12px;
    backdrop-filter: blur(10px);
  }

  .theory-q-number {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .theory-q-timer { color: var(--danger); font-weight: 700; }

  .theory-q-text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text-primary);
    font-weight: 500;
  }

  .theory-options-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }

  .theory-option-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    text-align: left;
    font-family: inherit;
    line-height: 1.45;
  }

  .theory-option-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
  }

  .theory-option-btn:active:not(:disabled) { transform: scale(0.98); }

  .theory-option-btn:disabled {
    cursor: default;
    opacity: 0.6;
  }

  .theory-option-btn.correct {
    background: var(--success-bg);
    border-color: var(--success);
    opacity: 1;
  }

  .theory-option-btn.wrong {
    background: var(--danger-bg);
    border-color: var(--danger);
    opacity: 1;
  }

  .option-letter {
    font-weight: 700;
    font-size: 12px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .theory-option-btn.correct .option-letter { background: rgba(52,211,153,0.3); }
  .theory-option-btn.wrong .option-letter { background: rgba(248,113,113,0.3); }

  .theory-explanation {
    font-size: 12px;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    margin-bottom: 12px;
    line-height: 1.5;
    display: none;
  }
  .theory-explanation.show { display: block; }
  .theory-explanation strong { color: var(--success); }

  /* ========== SHARED FEEDBACK ========== */
  .feedback {
    min-height: 22px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .feedback.correct-text { color: var(--success); }
  .feedback.wrong-text { color: var(--danger); }
  .feedback.levelup-text { color: var(--accent); }

  .action-row { display: flex; justify-content: center; gap: 10px; }

  .next-btn, .restart-btn, .change-level-btn, .back-home-btn {
    padding: 11px 22px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--accent);
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
  }

  .next-btn:hover, .restart-btn:hover, .change-level-btn:hover, .back-home-btn:hover { opacity: 0.9; }
  .next-btn:active, .restart-btn:active, .change-level-btn:active, .back-home-btn:active { transform: scale(0.97); }

  .restart-btn, .change-level-btn, .back-home-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }

  .hidden { display: none !important; }

  /* ========== SUMMARY CARD ========== */
  .summary-card {
    text-align: center;
    padding: 8px 0 4px;
  }
  .summary-card .big-xp {
    font-size: 36px;
    font-weight: 800;
    color: var(--success);
    margin: 10px 0 4px;
  }
  .summary-card .summary-line {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  /* Result stars */
  .result-stars {
    font-size: 28px;
    margin: 6px 0 12px;
    letter-spacing: 4px;
  }

  .result-grade {
    font-size: 14px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 999px;
    display: inline-block;
    margin-bottom: 14px;
  }

  .grade-a { background: var(--success-bg); color: var(--success); }
  .grade-b { background: rgba(124,92,255,0.18); color: var(--accent); }
  .grade-c { background: var(--warn-bg); color: var(--warn); }
  .grade-d { background: var(--danger-bg); color: var(--danger); }

  .cluster-result {
    text-align: left;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 12px;
  }
  .cluster-result-title {
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .cluster-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .cluster-label { flex: 1; color: var(--text-secondary); }
  .cluster-score { font-weight: 700; min-width: 32px; text-align: right; }
  .cluster-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
  .cluster-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .fill-green { background: var(--success); }
  .fill-purple { background: var(--accent); }
  .fill-yellow { background: var(--warn); }
  .fill-red { background: var(--danger); }

  @media (max-width: 360px) {
    .swatch { width: 44px; height: 44px; }
    .stat-value { font-size: 17px; }
    .theory-q-text { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="app-shell">

  <div class="app-header">
    <h1>TAMAN BERMAIN</h1>
    <p id="header-subtitle">Pilih game untuk dimainkan</p>
  </div>

  <!-- ========== SCREEN: HOME (pilih game) ========== -->
  <div id="screen-home">
    <div class="game-select-grid">
      <button class="game-card" id="go-color-mixer">
        <div class="game-card-icon">🖌️</div>
        <div class="game-card-info">
          <div class="game-card-name">Color Mixer Quiz</div>
          <div class="game-card-desc">Tebak hasil campuran warna berdasarkan swatch visual. Ada 3 level kesulitan.</div>
        </div>
        <div class="game-card-arrow">›</div>
      </button>

      <button class="game-card" id="go-theory">
        <div class="game-card-icon">📚</div>
        <div class="game-card-info">
          <div class="game-card-name">Soal anak TK</div>
          <div class="game-card-desc">50 soal pilihan ganda tentang teori warna, sistem RGB/CMYK, harmoni warna, dan psikologi warna.</div>
        </div>
        <div class="game-card-arrow">›</div>
      </button>
    </div>
  </div>

  <!-- ========== SCREEN: LEVEL SELECT (Color Mixer) ========== -->
  <div id="screen-level-select" class="hidden">
    <button class="back-link" id="back-to-home-from-mixer">← Kembali ke menu</button>
    <div class="level-select-grid" id="level-select-grid"></div>
  </div>

  <!-- ========== SCREEN: COLOR MIXER QUIZ ========== -->
  <div id="screen-quiz" class="hidden">
    <button class="back-link" id="back-to-levels">← Ganti level</button>

    <div class="stats-bar">
      <div class="stat-block">
        <div class="stat-label">Level</div>
        <div class="stat-value" id="level-out">-</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-block">
        <div class="stat-label">Skor</div>
        <div class="stat-value" id="score-out">0</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-block">
        <div class="stat-label">XP</div>
        <div class="stat-value xp" id="xp-out">0</div>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div id="quiz-active">
      <div class="question-card">
        <div class="question-label" id="question-label">Campuran warna apa ini?</div>
        <div class="swatch-row" id="swatch-row"></div>
      </div>

      <div class="options-grid" id="options-grid"></div>

      <div class="feedback" id="feedback"></div>

      <div class="action-row">
        <button class="next-btn hidden" id="next-btn">Soal berikutnya →</button>
      </div>
    </div>

    <div id="quiz-summary" class="hidden">
      <div class="question-card summary-card">

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function prettify(name){ return name.replace(/-/g," "); }
function makeSwatch(colorName, sizeClass) {
  var div = document.createElement("div");
  div.className = "swatch" + (sizeClass ? " "+sizeClass : "");
  div.style.background = palette[colorName] || "#888";
  return div;
}

function renderLevelSelect() {
  $("header-subtitle").textContent = "Color Mixer Quiz · Pilih level";
  var grid = $("level-select-grid");
  grid.innerHTML = "";
  levels.forEach(function(lvl){
    var btn = document.createElement("button");
    btn.className = "level-card";
    var left = document.createElement("div"); left.className = "level-card-left";
    var name = document.createElement("div"); name.className = "level-card-name"; name.textContent = lvl.name;
    var desc = document.createElement("div"); desc.className = "level-card-desc"; desc.textContent = lvl.desc + " · " + lvl.qs.length + " soal tersedia";
    left.appendChild(name); left.appendChild(desc);
    var badge = document.createElement("div"); badge.className = "level-card-badge "+lvl.badgeClass; badge.textContent = "+"+lvl.xp+" xp";
    btn.appendChild(left); btn.appendChild(badge);
    btn.addEventListener("click", function(){ startMixerLevel(lvl); });
    grid.appendChild(btn);
  });
}

function startMixerLevel(lvl) {
  activeLevel = lvl;
  mixerPool = shuffle(lvl.qs);
  sessionTarget = Math.min(SESSION_LENGTH, mixerPool.length);
  score = 0; xp = 0; questionsAnswered = 0;
  $("header-subtitle").textContent = lvl.desc;
  $("level-out").textContent = lvl.name;
  $("quiz-summary").classList.add("hidden");
  $("quiz-active").classList.remove("hidden");
  showScreen("quiz");
  updateMixerUI();
  renderMixerQuestion();
}

function drawMixerQuestion() {
  if (mixerPool.length === 0) mixerPool = shuffle(activeLevel.qs);
  var q = mixerPool.pop();
  var mix = q[0]; var answer = q[1];
  var wrongPool = Object.keys(palette).filter(function(c){ return c !== answer && mix.indexOf(c) === -1; });
  var wrongs = shuffle(wrongPool).slice(0,3);
  var options = shuffle([answer].concat(wrongs));
  return { mix, answer, options };
}

function updateMixerUI() {
  $("score-out").textContent = score;
  $("xp-out").textContent = xp;
  var pct = Math.min(100, Math.round((questionsAnswered/sessionTarget)*100));
  $("progress-fill").style.width = pct+"%";
}

function startMixerTimer(seconds) {
  clearInterval(timer);
  if (!seconds) return;
  timeLeft = seconds;
  renderMixerTimerLabel();
  timer = setInterval(function(){
    timeLeft--;
    renderMixerTimerLabel();
    if (timeLeft <= 0) {
      clearInterval(timer);
      lockMixerAnswers();
      revealMixerCorrect();
      $("feedback").textContent = "Waktu habis. Jawaban: "+prettify(currentQ.answer);
      $("feedback").className = "feedback wrong-text";
      afterMixerAnswer();
    }
  }, 1000);
}

function renderMixerTimerLabel() {
  if (activeLevel.time) {
    $("question-label").innerHTML = "Campuran warna-warna di bawah ini menghasilkan warna apa? <span class=\"timer\">("+timeLeft+"s)</span>";
  } else {
    $("question-label").textContent = "Campuran warna-warna di bawah ini menghasilkan warna apa?";
  }
}

function renderMixerQuestion() {
  $("feedback").textContent = "";
  $("feedback").className = "feedback";
  $("next-btn").classList.add("hidden");
  currentQ = drawMixerQuestion();
  renderMixerTimerLabel();
  var sr = $("swatch-row");
  sr.innerHTML = "";
  sr.className = "swatch-row count-"+currentQ.mix.length;
  currentQ.mix.forEach(function(c, i){
    var item = document.createElement("div"); item.className = "swatch-item";
    item.appendChild(makeSwatch(c,""));
    var nl = document.createElement("span"); nl.className = "swatch-name"; nl.textContent = prettify(c);
    item.appendChild(nl);
    sr.appendChild(item);
    if (i < currentQ.mix.length-1) {
      var plus = document.createElement("span"); plus.className = "plus-sign"; plus.textContent = "+";
      sr.appendChild(plus);
    }
  });
  var og = $("options-grid"); og.innerHTML = "";
  currentQ.options.forEach(function(opt){
    var btn = document.createElement("button"); btn.className = "option-btn";
    btn.appendChild(makeSwatch(opt,"small"));
    var lbl = document.createElement("span"); lbl.textContent = prettify(opt);
    btn.appendChild(lbl);
    btn.addEventListener("click", function(){ selectMixerAnswer(opt, btn); });
    og.appendChild(btn);
  });
  startMixerTimer(activeLevel.time);
}

function lockMixerAnswers() {
  clearInterval(timer);
  document.querySelectorAll(".option-btn").forEach(function(b){ b.disabled = true; });
}

function revealMixerCorrect() {
  document.querySelectorAll(".option-btn").forEach(function(b){
    var lbl = b.querySelector("span:last-child").textContent;
    if (lbl === prettify(currentQ.answer)) b.classList.add("correct");
  });
}

function selectMixerAnswer(opt, btn) {
  lockMixerAnswers();
  if (opt === currentQ.answer) {
    btn.classList.add("correct");
    score++; xp += activeLevel.xp;
    $("feedback").textContent = "Benar! +"+activeLevel.xp+" XP";
    $("feedback").className = "feedback correct-text";
  } else {
    btn.classList.add("wrong");
    revealMixerCorrect();
    $("feedback").textContent = "Kurang tepat. Jawaban: "+prettify(currentQ.answer);
    $("feedback").className = "feedback wrong-text";
  }
  afterMixerAnswer();
}

function afterMixerAnswer() {
  questionsAnswered++;
  updateMixerUI();
  $("next-btn").textContent = questionsAnswered >= sessionTarget ? "Lihat hasil →" : "Soal berikutnya →";
  $("next-btn").classList.remove("hidden");
}

function showMixerSummary() {
  $("quiz-active").classList.add("hidden");
  $("quiz-summary").classList.remove("hidden");
  $("summary-xp").textContent = xp+" XP";
  $("summary-line").textContent = score+" dari "+questionsAnswered+" benar · Level "+activeLevel.name;
}

$("next-btn").addEventListener("click", function(){
  if (questionsAnswered >= sessionTarget) showMixerSummary();
  else renderMixerQuestion();
});

function renderTheorySelect() {
  $("header-subtitle").textContent = "Soal anak TK · Pilih kategori";
  var grid = $("category-select-grid");
  grid.innerHTML = "";

  theoryCategories.forEach(function(cat){
    var wrap = document.createElement("div"); wrap.className = "category-card-wrap";

    // Baris: kartu kategori + tombol materi
    var row = document.createElement("div"); row.className = "category-card-actions";

    var btn = document.createElement("button"); btn.className = "category-card";
    var left = document.createElement("div"); left.className = "category-card-left";
    var nm = document.createElement("div"); nm.className = "category-card-name"; nm.textContent = cat.name;
    var sub = document.createElement("div"); sub.className = "category-card-sub"; sub.textContent = cat.sub;
    left.appendChild(nm); left.appendChild(sub);
    var badge = document.createElement("div"); badge.className = "category-card-badge"; badge.textContent = cat.badge;
    btn.appendChild(left); btn.appendChild(badge);
    btn.addEventListener("click", function(){ startTheoryQuiz(cat); });

    // Tombol baca materi
    var mBtn = document.createElement("button"); mBtn.className = "materi-btn";
    mBtn.innerHTML = '<span class="materi-btn-icon">📖</span><span>Materi</span>';

    // Panel materi (tersembunyi awalnya)
    var panel = document.createElement("div"); panel.className = "materi-panel";
    var mk = materiKonten[cat.id];
    if (mk) {
      panel.innerHTML = "<h4>"+mk.judul+"</h4>"+mk.isi+
        '<button class="mulai-dari-materi-btn" data-catid="'+cat.id+'">▶ Mulai soal '+cat.name+'</button>';
    }

    mBtn.addEventListener("click", function(e){
      e.stopPropagation();
      var isOpen = panel.classList.contains("open");
      // Tutup semua panel lain
      document.querySelectorAll(".materi-panel.open").forEach(function(p){ p.classList.remove("open"); });
      document.querySelectorAll(".materi-btn.active").forEach(function(b){ b.classList.remove("active"); });
      if (!isOpen) {
        panel.classList.add("open");
        mBtn.classList.add("active");
        panel.scrollIntoView({ behavior:"smooth", block:"nearest" });
      }
    });

    row.appendChild(btn);
    row.appendChild(mBtn);
    wrap.appendChild(row);
    wrap.appendChild(panel);
    grid.appendChild(wrap);
  });

  // Delegasi klik tombol "Mulai soal" dari dalam panel
  grid.addEventListener("click", function(e){
    if (e.target && e.target.classList.contains("mulai-dari-materi-btn")) {
      var cid = e.target.getAttribute("data-catid");
      var cat = theoryCategories.find(function(c){ return c.id === cid; });
      if (cat) startTheoryQuiz(cat);
    }
  });
}

function startTheoryQuiz(cat) {
  theoryCategory = cat;
  var pool = cat.filter === null ? theoryQuestions : theoryQuestions.filter(function(q){ return q.cluster === cat.filter; });
  theoryPool = shuffle(pool).slice(0, theorySESSION);
  theoryIndex = 0;
  theoryCorrect = 0;
  theoryXP = 0;
  theorySessionTotal = theoryPool.length;
  clusterResults = {};

  $("header-subtitle").textContent = "Kuis Teori: "+cat.name;
  $("theory-summary").classList.add("hidden");
  $("theory-quiz-active").classList.remove("hidden");
  showScreen("theory");
  updateTheoryUI();
  renderTheoryQuestion();
}

function updateTheoryUI() {
  $("tq-num").textContent = theoryIndex+1 <= theorySessionTotal ? theoryIndex+1 : theorySessionTotal;
  $("tq-correct").textContent = theoryCorrect;
  $("tq-xp").textContent = theoryXP;
  var pct = Math.min(100, Math.round((theoryIndex/theorySessionTotal)*100));
  $("tq-progress").style.width = pct+"%";
}

function renderTheoryQuestion() {
  clearInterval(theoryTimer);
  $("tq-feedback").textContent = "";
  $("tq-feedback").className = "feedback";
  $("tq-next-btn").classList.add("hidden");
  $("tq-explanation").className = "theory-explanation";

  theoryCurrent = theoryPool[theoryIndex];

  $("tq-label").textContent = "Pertanyaan "+(theoryIndex+1)+" dari "+theorySessionTotal;

  // Timer hanya untuk kategori "semua" (opsional) — tidak ada timer di mode normal
  var timerEl = $("tq-timer");
  timerEl.classList.add("hidden");

  $("tq-text").textContent = theoryCurrent.q;

  var og = $("tq-options"); og.innerHTML = "";
  var letters = ["A","B","C","D"];
  theoryCurrent.opts.forEach(function(opt, idx){
    var btn = document.createElement("button"); btn.className = "theory-option-btn";
    var letter = document.createElement("span"); letter.className = "option-letter"; letter.textContent = letters[idx];
    var text = document.createElement("span"); text.textContent = opt;
    btn.appendChild(letter); btn.appendChild(text);
    btn.addEventListener("click", function(){ selectTheoryAnswer(idx, btn); });
    og.appendChild(btn);
  });
}

function lockTheoryAnswers() {
  clearInterval(theoryTimer);
  document.querySelectorAll(".theory-option-btn").forEach(function(b){ b.disabled = true; });
}

function revealTheoryCorrect() {
  document.querySelectorAll(".theory-option-btn").forEach(function(b, i){
    if (i === theoryCurrent.ans) b.classList.add("correct");
  });
}

function selectTheoryAnswer(idx, btn) {
  lockTheoryAnswers();
  var isCorrect = idx === theoryCurrent.ans;
  var cluster = theoryCurrent.cluster;
  if (!clusterResults[cluster]) clusterResults[cluster] = { correct:0, total:0 };
  clusterResults[cluster].total++;

  if (isCorrect) {
    btn.classList.add("correct");
    theoryCorrect++;
    theoryXP += 20;
    clusterResults[cluster].correct++;
    $("tq-feedback").textContent = "✓ Benar! +20 XP";
    $("tq-feedback").className = "feedback correct-text";
  } else {
    btn.classList.add("wrong");
    revealTheoryCorrect();
    $("tq-feedback").textContent = "✗ Kurang tepat. Lihat penjelasan jawaban yang benar di atas.";
    $("tq-feedback").className = "feedback wrong-text";
    // Tampilkan penjelasan singkat
    var expEl = $("tq-explanation");
    expEl.innerHTML = "<strong>Jawaban:</strong> "+["A","B","C","D"][theoryCurrent.ans]+". "+theoryCurrent.opts[theoryCurrent.ans];
    expEl.className = "theory-explanation show";
  }

  $("tq-next-btn").textContent = theoryIndex+1 >= theorySessionTotal ? "Lihat hasil →" : "Soal berikutnya →";
  $("tq-next-btn").classList.remove("hidden");

  updateTheoryUI();
}

$("tq-next-btn").addEventListener("click", function(){
  theoryIndex++;
  if (theoryIndex >= theorySessionTotal) showTheorySummary();
  else { updateTheoryUI(); renderTheoryQuestion(); }
});

function showTheorySummary() {
  $("theory-quiz-active").classList.add("hidden");
  $("theory-summary").classList.remove("hidden");

  var pct = theorySessionTotal > 0 ? Math.round((theoryCorrect/theorySessionTotal)*100) : 0;

  // Stars
  var stars = pct >= 90 ? "⭐⭐⭐" : pct >= 70 ? "⭐⭐" : pct >= 50 ? "⭐" : "☆";
  $("ts-stars").textContent = stars;
  $("ts-xp").textContent = theoryXP + " XP";
  $("ts-line").textContent = theoryCorrect+" dari "+theorySessionTotal+" benar ("+pct+"%)";
  $("ts-category-label").textContent = theoryCategory.name;

  // Grade
  var gradeEl = $("ts-grade");
  if (pct >= 90) { gradeEl.textContent = "Nilai A · Luar Biasa!"; gradeEl.className = "result-grade grade-a"; }
  else if (pct >= 75) { gradeEl.textContent = "Nilai B · Bagus!"; gradeEl.className = "result-grade grade-b"; }
  else if (pct >= 60) { gradeEl.textContent = "Nilai C · Cukup"; gradeEl.className = "result-grade grade-c"; }
  else { gradeEl.textContent = "Nilai D · Perlu Belajar Lagi"; gradeEl.className = "result-grade grade-d"; }

  // Cluster breakdown (hanya jika lebih dari 1 klaster)
  var clusterKeys = Object.keys(clusterResults);
  var clusterEl = $("ts-cluster");
  if (clusterKeys.length > 1) {
    clusterEl.style.display = "block";
    var fills = ["fill-green","fill-purple","fill-yellow","fill-red","fill-green"];
    var html = "<div class=\"cluster-result-title\">Hasil per Klaster Materi</div>";
    clusterKeys.forEach(function(k){
      var c = clusterResults[k];
      var pctC = c.total > 0 ? Math.round((c.correct/c.total)*100) : 0;
      var fillClass = fills[parseInt(k)] || "fill-purple";
      html += "<div class=\"cluster-row\">"
        + "<span class=\"cluster-label\">"+clusterNames[parseInt(k)]+"</span>"
        + "<span class=\"cluster-score\">"+c.correct+"/"+c.total+"</span>"
        + "<div class=\"cluster-bar-wrap\"><div class=\"cluster-bar-fill "+fillClass+"\" style=\"width:"+pctC+"%\"></div></div>"
        + "</div>";
    });
    clusterEl.innerHTML = html;
  } else {
    clusterEl.style.display = "none";
  }
}

$("ts-restart").addEventListener("click", function(){ startTheoryQuiz(theoryCategory); });
$("ts-change").addEventListener("click", function(){ showScreen("theorySelect"); renderTheorySelect(); });
$("back-to-theory-select").addEventListener("click", function(){ clearInterval(theoryTimer); showScreen("theorySelect"); renderTheorySelect(); });
